<!-- SpendWellFi horizontal lockup: slot-coin mark + bespoke wordmark. -->
<svg viewBox="0 0 380 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SpendWellFi">
  <!-- The slot coin -->
  <g transform="translate(8 8)">
    <path fill="#5B8A72" fill-rule="evenodd"
          d="M 32 2 a 30 30 0 1 0 0 60 a 30 30 0 1 0 0 -60 z
             M 18 29 h 28 a 3 3 0 0 1 0 6 h -28 a 3 3 0 0 1 0 -6 z" />
  </g>
  <!-- Wordmark -->
  <text x="84" y="56"
        font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-2"
        fill="#1c1917">SpendWell</text>
  <circle cx="316" cy="44" r="8" fill="#5B8A72" />
  <text x="332" y="56"
        font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-2"
        fill="#1c1917">Fi</text>
</svg>
