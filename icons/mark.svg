<!-- SpendWellFi logomark.
     A geometric S with a vertical stem that subtly evokes a dollar sign.
     Use currentColor in CSS so it inherits from the parent (white on sage,
     sage on cream — switchable by context). -->
<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SpendWellFi">
  <g fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical stem: extends slightly past S bounds for the dollar-sign hint -->
    <path d="M20 5 V35" />
    <!-- S curve: traditional dollar-sign anatomy, geometric and balanced -->
    <path d="M28 13 C28 9 24 7.5 20 7.5 C16 7.5 12 9 12 13 C12 17 17 18 20 19 C23 20 28 21 28 25 C28 29 24 32.5 20 32.5 C16 32.5 12 31 12 27" />
  </g>
</svg>
