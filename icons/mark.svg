<!-- SpendWellFi icon mark: a sage coin with a slot cut through the middle.
     The slot is negative space (transparent), not a second color, so the
     mark embroiders cleanly in a single thread. The shape reads as a
     piggy-bank slot or coin slot - the gesture of putting money away. -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SpendWellFi">
  <path fill="currentColor" fill-rule="evenodd"
        d="M 32 2 a 30 30 0 1 0 0 60 a 30 30 0 1 0 0 -60 z
           M 18 29 h 28 a 3 3 0 0 1 0 6 h -28 a 3 3 0 0 1 0 -6 z" />
</svg>
