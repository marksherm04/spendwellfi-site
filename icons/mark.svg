<!-- SpendWellFi standalone icon mark.
     The sage coin (extracted from the wordmark) carrying a bold white S.
     Uses currentColor for the coin so it can be tinted by context. -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SpendWellFi">
  <!-- The coin -->
  <circle cx="32" cy="32" r="30" fill="currentColor" />
  <!-- The S, weighted for clarity at small sizes -->
  <path d="M 44 23
           C 44 18.5 39 15.5 32 15.5
           C 25 15.5 20 18.5 20 23
           C 20 28 27 29 32 30.5
           C 37 32 44 33 44 38.5
           C 44 43 39 46 32 46
           C 25 46 20 43 20 38.5"
        fill="none" stroke="#ffffff" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round" />
</svg>
