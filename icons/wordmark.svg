<!-- SpendWell·Fi bespoke wordmark.
     The sage dot replaces the middle of "SpendWellFi" - it acts as both
     punctuation (separating action from designation) and the brand's
     singular visual signature, which extends to the standalone icon mark. -->
<svg viewBox="0 0 380 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SpendWellFi">
  <text x="6" y="60"
        font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
        font-size="56" font-weight="800" letter-spacing="-2.4"
        fill="#1c1917">SpendWell</text>
  <circle cx="278" cy="44" r="10" fill="#5B8A72" />
  <text x="298" y="60"
        font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
        font-size="56" font-weight="800" letter-spacing="-2.4"
        fill="#1c1917">Fi</text>
</svg>
